---
# =========================================================================================== #
# File: 'ansible/playbooks/wazuh_trigger_fim.yml'
# --- [ Description ] ----------------------------------------------------------------------- #
# Standalone proof task: fire a REAL File Integrity Monitoring event ON AN AGENT and confirm it
# lands in the wazuh-alerts index that backs the dashboard UI. Run this AFTER the agent is
# deployed and enrolled (playbooks/wazuh_agent.yml). Defaults fim_demo_dir to
# /etc/wazuh-fim-demo — a subdirectory of /etc, which the lab inventory already arms for
# realtime FIM (wazuh_agent.fim.realtime_paths: ['/etc']) — so no extra arming is needed out
# of the box. Override with -e fim_demo_dir=<other-already-watched-path> for a different
# inventory.
#
#   ansible-playbook -i lab/inventory.yml playbooks/wazuh_trigger_fim.yml -e env=int \
#     -e @/path/to/lab-become.json
#
# What it proves (and does NOT fake): the alert is generated by the ENDPOINT AGENT
# (agent.id != "000", the manager's local agent), travels agent -> manager -> filebeat ->
# indexer, and is queryable exactly as the Wazuh dashboard queries it. Contrast with
# wazuh_pipeline_smoke.yml, which injects a synthetic alert directly into the manager's
# alerts.json (agent 000) and only exercises the indexing pipeline, not the agent path.
#
# Idempotent-ish: each run writes a uniquely-named file, so each run is a fresh, provable event.
# =========================================================================================== #

- name: 'Trigger FIM - write a monitored file on the agent'
  hosts: 'wazuh_agents'
  gather_facts: false
  become: true
  vars:
    ENV: "{{ env }}"
    fim_demo_dir: '/etc/wazuh-fim-demo'
  environment:
    ENV: "{{ env }}"
  tasks:

    - name: 'TRIGGER | Ensure The Real-Time Watched Demo Directory Exists'
      ansible.builtin.file:
        path:  "{{ fim_demo_dir }}"
        state: 'directory'
        owner: 'root'
        group: 'root'
        mode:  '0755'

    # A per-run unique filename makes each invocation a distinct, unambiguous event to search
    # for — no risk of matching a stale alert from an earlier run. inventory_hostname + a random
    # suffix keeps it readable in the dashboard. (No Date/epoch: keep it deterministic-free.)
    - name: 'TRIGGER | Compute A Unique Marker For This Run'
      ansible.builtin.set_fact:
        __fim_marker__: "fim-proof-{{ inventory_hostname }}-{{ 9999999999 | random }}"

    - name: 'TRIGGER | Create The File (This Is The FIM Event The Agent Detects In Real Time)'
      ansible.builtin.copy:
        dest:    "{{ fim_demo_dir }}/{{ __fim_marker__ }}.txt"
        content: "secure-wazuh FIM proof {{ __fim_marker__ }}\n"
        owner:   'root'
        group:   'root'
        mode:    '0644'

    - name: 'TRIGGER | Report The Marker + Monitored Path'
      ansible.builtin.debug:
        msg: "Wrote {{ fim_demo_dir }}/{{ __fim_marker__ }}.txt on {{ inventory_hostname }} — expect a syscheck 'added' alert from this agent."

- name: 'Trigger FIM - prove the AGENT alert reached the indexer (what the UI shows)'
  hosts: 'wazuh_servers'
  gather_facts: false
  become: true
  run_once: true
  vars:
    # Must match play 1's fim_demo_dir default — both are overridable via the SAME
    # -e fim_demo_dir= extra-var, which applies playbook-wide and so stays consistent.
    fim_demo_dir: '/etc/wazuh-fim-demo'
    # The agent host whose event we just fired (first — and only — wazuh_agents member here).
    __agent_host__: "{{ groups['wazuh_agents'][0] }}"
    __marker__:     "{{ hostvars[groups['wazuh_agents'][0]].__fim_marker__ }}"
    __agent_path__: "{{ fim_demo_dir }}/{{ hostvars[groups['wazuh_agents'][0]].__fim_marker__ }}.txt"
  tasks:

    - name: 'PROVE | Wait For The Agent FIM Alert In wazuh-alerts-* (agent.id != 000)'
      register: '__fim_search__'
      retries: 24
      delay: 5
      until: >-
        (__fim_search__.json.hits.total.value | default(0) | int) > 0
      ansible.builtin.uri:
        # Query the indexer over loopback: this play runs ON the indexer host, and the node
        # cert's SANs are 127.0.0.1/localhost/<node-name> — NOT the lab ansible_host IP, so
        # https://<ansible_host>:9200 would fail TLS hostname verification under validate_certs.
        url: "https://127.0.0.1:9200/wazuh-alerts-*/_search"
        method: 'POST'
        client_cert: '/etc/wazuh-indexer/certs/admin.pem'
        client_key:  '/etc/wazuh-indexer/certs/admin-key.pem'
        ca_path:     '/etc/wazuh-indexer/certs/root-ca.pem'
        validate_certs: true
        body_format: 'json'
        # syscheck.path is a keyword field, so use `term` (exact) not `match` (text analysis).
        # Also gate on the endpoint agent id so this can never pass on a manager-local (000)
        # event — the whole point is to prove the ENDPOINT reported it.
        body:
          size: 1
          sort: [{ '@timestamp': 'desc' }]
          query:
            bool:
              must:
                - { term: { 'syscheck.path': "{{ __agent_path__ }}" } }
                - { term: { 'agent.name': "{{ __agent_host__ }}" } }
              must_not:
                - { term: { 'agent.id': '000' } }

    - name: 'PROVE | Assert The Alert Exists And Is Attributed To The ENDPOINT Agent'
      vars:
        __hit__: "{{ __fim_search__.json.hits.hits[0]._source | default({}) }}"
      ansible.builtin.assert:
        that:
          - (__fim_search__.json.hits.total.value | default(0) | int) > 0
          - __hit__.agent.id | default('000') != '000'
        fail_msg: >-
          No agent-sourced FIM alert for {{ __agent_path__ }} was found in wazuh-alerts-*.
          Check that {{ __agent_host__ }} is enrolled/active on the manager, that its ossec.conf
          has a <directories realtime="yes"> block for the demo path, and that filebeat is
          shipping to the indexer.
        success_msg: >-
          PROVEN: FIM alert from agent id={{ __hit__.agent.id }} name={{ __hit__.agent.name }}
          rule {{ __hit__.rule.id }} '{{ __hit__.rule.description }}' for {{ __agent_path__ }}
          indexed in {{ __fim_search__.json.hits.hits[0]._index }} — visible in the dashboard
          under Threat Hunting / FIM filtered on this agent.
