[defaults]
# STIG-friendly tmp paths — /home, /tmp, /var/tmp are noexec on STIG'd hosts.
# /opt is exec-OK and not subject to STIG noexec mounts.
local_tmp  = /opt/wazuh-deploy/.tmp
remote_tmp = /opt/wazuh-deploy/.tmp

inventory        = ./inventory/proxmox.yml
roles_path       = ./applications
collections_path = ./.collections

# Don't gather facts unconditionally — the loader does it on demand via setup module
gathering = explicit

# Default interpreter is auto-discovered (lands on /usr/libexec/platform-python on
# RHEL/Rocky 8). The dnf/rpm_key/file-with-selinux/firewalld modules only ship Python
# C bindings for platform-python 3.6 on RHEL 8 — no python3.12-{libselinux,firewall,dnf}
# exists in AppStream. The bootstrap venv (/opt/ansible/venv, Python 3.12) is used ONLY
# on the amazon.aws.s3_object tasks, which need modern boto3/botocore — those tasks
# carry a block-level `ansible_python_interpreter: /opt/ansible/venv/bin/python` override.

# Fail loudly on undefined vars; surface deprecations
force_handlers       = True
nocows               = True
deprecation_warnings = True

# Lab/internal switch: hosts are short-lived, key churn is high
host_key_checking = False

# Performance: cache facts to /opt for the session
fact_caching            = jsonfile
fact_caching_connection = /opt/wazuh-deploy/.tmp/facts
fact_caching_timeout    = 7200

[privilege_escalation]
become          = True
become_method   = sudo
become_user     = root
become_ask_pass = False

[ssh_connection]
pipelining       = True
control_path_dir = /opt/wazuh-deploy/.tmp/cp
